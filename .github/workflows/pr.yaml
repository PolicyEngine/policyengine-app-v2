name: PR checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Check formatting with Prettier
        working-directory: ./app
        run: bun run prettier

      - name: Run ESLint
        working-directory: ./app
        run: bun run eslint

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Run TypeScript type checks (app)
        working-directory: ./app
        run: bun run typecheck

      - name: Run TypeScript type checks (website)
        working-directory: ./website
        run: bun run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Run design system tests
        run: bun run test --filter=@policyengine/design-system

      - name: Run app tests
        working-directory: ./app
        run: bun run test

      - name: Run website tests
        working-directory: ./website
        run: bun run test

  check-embeds:
    name: Check embedded site URLs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify GitHub Pages embed URLs return 200
        run: |
          FAILED=0
          # Extract all policyengine.github.io URLs from page components,
          # stripping template-literal expressions like ${countryId} and ?query params
          for raw_url in $(grep -roh "https://policyengine\.github\.io/[^'\"]*" app/src/pages/ website/src/app/ | sort -u); do
            # Remove template expressions (${...}) and query strings for the health check
            url=$(echo "$raw_url" | sed 's/\${[^}]*}//g' | sed 's/?.*//')
            # Remove trailing slash for consistency
            url=${url%/}
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$url")
            if [ "$STATUS" != "200" ]; then
              echo "BROKEN EMBED: $url returned $STATUS (from: $raw_url)"
              FAILED=1
            else
              echo "OK: $url"
            fi
          done
          if [ "$FAILED" = "1" ]; then exit 1; fi

  visual-tests:
    name: Visual regression
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Build design system
        run: npm run design-system:build

      - name: Run visual tests
        working-directory: ./app
        run: npx playwright test --grep @visual
        env:
          HOME: /root

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-test-results
          path: app/test-results/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Build application
        working-directory: ./app
        run: bun run build

      - name: Build website
        working-directory: ./website
        run: bun run build
