name: PR checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  guard-app-dir:
    name: Guard app/ directory
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for website-related changes to app/ and root vercel.json
        run: |
          # Get files changed in this PR (vs base branch)
          ALL_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Website-specific paths in app/ that have been ported to website/
          # and should no longer be modified in app/.
          # Calculator components (report builder, household, charts, etc.) are
          # still legitimately modified in app/ since calculator-app/ imports from there.
          WEBSITE_BLOCKED=$(echo "$ALL_CHANGED" | grep -E \
            -e '^app/src/components/home/' \
            -e '^app/src/components/shared/static/' \
            -e '^app/src/components/shared/HomeHeader\.tsx' \
            -e '^app/src/components/homeHeader/' \
            -e '^app/src/components/Footer\.tsx' \
            -e '^app/src/components/FooterSubscribe\.tsx' \
            -e '^app/src/components/blog/BlogPostCard\.tsx' \
            -e '^app/src/components/blog/BlogPostGrid\.tsx' \
            -e '^app/src/components/blog/ResearchFilters\.tsx' \
            -e '^app/src/components/blog/blogStyles\.ts' \
            -e '^app/src/pages/Home\.page\.tsx' \
            -e '^app/src/pages/Research\.page\.tsx' \
            -e '^app/src/pages/Blog\.page\.tsx' \
            -e '^app/src/pages/Team\.page\.tsx' \
            -e '^app/src/pages/Supporters\.page\.tsx' \
            -e '^app/src/pages/Donate\.page\.tsx' \
            -e '^app/src/pages/Privacy\.page\.tsx' \
            -e '^app/src/pages/Terms\.page\.tsx' \
            -e '^app/src/pages/Brand' \
            -e '^app/src/pages/Citations\.page\.tsx' \
            -e '^app/src/pages/AppPage\.tsx' \
          || true)

          # Root vercel.json (Vite app config — new rewrites should go in website/next.config.ts)
          VERCEL_BLOCKED=$(echo "$ALL_CHANGED" | grep '^vercel.json$' || true)

          BLOCKED="${WEBSITE_BLOCKED}${VERCEL_BLOCKED:+$'\n'$VERCEL_BLOCKED}"
          BLOCKED=$(echo "$BLOCKED" | sed '/^$/d')

          if [ -n "$BLOCKED" ]; then
            echo "::error::⚠️ Migration guard: the following files have been ported to the Next.js website."
            echo "This check is temporary — it will be removed after the Next.js cutover (#817)."
            echo ""
            echo "Files flagged:"
            echo "$BLOCKED"
            echo ""
            echo "These files now have Next.js equivalents in website/. Make your changes there instead."
            echo "Calculator components in app/ (report builder, household, charts, etc.) are fine to modify."
            echo ""
            echo "  - Website pages/components → website/src/"
            echo "  - vercel.json (root) → website/next.config.ts rewrites"
            echo "  - app/src/data/*, app/public/assets/* → OK (shared data)"
            echo ""
            exit 1
          fi

  lint:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Check formatting with Prettier
        working-directory: ./app
        run: bun run prettier

      - name: Run ESLint
        working-directory: ./app
        run: bun run eslint

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Run TypeScript type checks (app)
        working-directory: ./app
        run: bun run typecheck

      - name: Run TypeScript type checks (website)
        working-directory: ./website
        run: bun run typecheck

      - name: Typecheck calculator
        working-directory: ./calculator-app
        run: bun run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Run design system tests
        run: bun run test --filter=@policyengine/design-system

      - name: Run app tests
        working-directory: ./app
        run: bun run test

      - name: Run website tests
        working-directory: ./website
        run: bun run test

  check-markdown-drift:
    name: Check MarkdownFormatter drift
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify MarkdownFormatter copies have matching top-level API
        run: bunx tsx scripts/check-markdown-drift.ts

  check-embeds:
    name: Check embedded site URLs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify GitHub Pages embed URLs return 200
        run: |
          FAILED=0
          # Extract all policyengine.github.io URLs from page components,
          # stripping template-literal expressions like ${countryId} and ?query params
          for raw_url in $(grep -roh "https://policyengine\.github\.io/[^'\"]*" app/src/pages/ website/src/app/ | sort -u); do
            # Remove template expressions (${...}) and query strings for the health check
            url=$(echo "$raw_url" | sed 's/\${[^}]*}//g' | sed 's/?.*//')
            # Remove trailing slash for consistency
            url=${url%/}
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$url")
            if [ "$STATUS" != "200" ]; then
              echo "BROKEN EMBED: $url returned $STATUS (from: $raw_url)"
              FAILED=1
            else
              echo "OK: $url"
            fi
          done
          if [ "$FAILED" = "1" ]; then exit 1; fi

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design system
        run: bun run design-system:build

      - name: Build application
        working-directory: ./app
        run: bun run build

      - name: Build website
        working-directory: ./website
        run: bun run build

      - name: Build calculator
        working-directory: ./calculator-app
        run: bun run build
