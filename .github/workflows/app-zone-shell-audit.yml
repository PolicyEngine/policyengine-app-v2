name: App-zone shell audit

on:
  pull_request:
    paths:
      - "website/src/data/appZoneRoutes.ts"
      - ".github/scripts/audit-app-zone-shell.mjs"
      - ".github/workflows/app-zone-shell-audit.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

jobs:
  audit:
    name: Audit PolicyEngine shell on app-zone routes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npm install --no-save playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run app-zone shell audit
        env:
          APP_ZONE_ALLOW_DESTINATION_FALLBACK: ${{ github.event_name == 'pull_request' && '1' || '0' }}
        run: node .github/scripts/audit-app-zone-shell.mjs
